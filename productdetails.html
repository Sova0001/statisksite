<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detaljer om produkt</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <a href="index.html">
        <h1>FashionRUs</h1>
      </a>
      <nav>
        <a href="index.html">Categories</a>
        <a href="index.html">Brands</a>
        <a href="index.html">Seasons</a>
      </nav>
    </header>

    <a href="productlist.html">Back</a>
    <main id="productContainer">
      <figure>
        <img
          src="https://kea-alt-del.dk/t7/images/webp/640/1535.webp"
          alt="Produktbillede"
          class="productImage"
        />
        <span class="saleLabel"></span>
      </figure>
      <section class="productDetails">
        <h2 class="productName">Unisex Logo Cap</h2>
        <div>
          <p class="articleType"><span class="bold">Type:</span> Caps</p>
          <p class="productCategory">
            <span class="bold">Kategori:</span> Accessories
          </p>
          <p class="productPrice"><span class="bold">Pris:</span> 699,-</p>
          <p class="stock"><span class="bold">Stock:</span> 5</p>
        </div>
        <button class="buyButton">Køb nu</button>
      </section>
    </main>
  </body>
</html>
